name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dotnet-fable
        run: dotnet tool install --global fable --version 4.3.0

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Run Fable (F# -> JS)
        run: fable StudyFlowAlpha.fsproj --outDir fable_output --noCache

      - name: Install npm dependencies
        run: npm install

      - name: Build with webpack
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
